version: 2

models:
  - name: stg_brand_weekly_metrics
    description: "Staged brand weekly metrics joining raw metrics with brand names"
    columns:
      - name: brand_name
        description: "Brand name"
        tests:
          - not_null
      - name: week_start
        description: "Monday of the tracking week"
        tests:
          - not_null
      - name: wikipedia_views
        description: "Total Wikipedia pageviews for the week"